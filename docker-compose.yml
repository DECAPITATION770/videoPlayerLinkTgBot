services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "8000:8000"
    environment:
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8000}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DB_PATH: sqlite+aiosqlite:////app/data/tgplayer.db
      MEDIA_DIR: /app/media
    volumes:
      - tgplayer-data:/app/data
      - tgplayer-media:/app/media
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    environment:
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8000}
      APP_URL: ${APP_URL:-http://app:8000}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_API_URL: ${TELEGRAM_BOT_API_URL:-}
    volumes:
      # Для локального API: файлы сохраняются на диск, бот читает по пути
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    depends_on:
      - app
    restart: unless-stopped

  telegram-bot-api:
    image: aiogram/telegram-bot-api:9.5
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "1"
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    ports:
      - "8081:8081"
    restart: unless-stopped

volumes:
  tgplayer-data:
  tgplayer-media:
  telegram-bot-api-data:
