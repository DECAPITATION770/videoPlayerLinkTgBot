services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "8000:8000"
    environment:
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8000}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_API_URL: ${TELEGRAM_BOT_API_URL:-}
      DB_PATH: sqlite+aiosqlite:////app/data/tgplayer.db
      MEDIA_DIR: /app/media
    volumes:
      - tgplayer-data:/app/data
      - tgplayer-media:/app/media
    restart: unless-stopped

volumes:
  tgplayer-data:
  tgplayer-media:
