services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8000}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_API_URL: http://telegram-bot-api:8081
      DB_PATH: sqlite+aiosqlite:////app/data/tgplayer.db
      MEDIA_DIR: /app/media
    volumes:
      - tgplayer-data:/app/data
      - tgplayer-media:/app/media
    depends_on:
      - telegram-bot-api
    restart: unless-stopped

  telegram-bot-api:
    image: heilkit/telegram-bot-api:latest
    command: -d /data -v 1 --local --api-id=${TELEGRAM_API_ID} --api-hash=${TELEGRAM_API_HASH}
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
    volumes:
      - bot-api-data:/data
    ports:
      - "8081:8081"
    restart: unless-stopped

volumes:
  tgplayer-data:
  tgplayer-media:
  bot-api-data:
